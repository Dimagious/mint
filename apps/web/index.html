<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — defence-in-depth for a browser-only app.
      * default-src 'self'       — no third-party origins by default.
      * script-src 'self'        — only our bundled JS may execute. Inline
                                   scripts are blocked entirely (Vite emits
                                   external modules, not inline ones).
      * style-src 'self' 'unsafe-inline' https://fonts.googleapis.com
                                 — MUI + emotion require inline styles for
                                   theming; Google Fonts is the on-demand
                                   font loader used by `packages/ui/fonts.ts`.
      * img-src 'self' data: blob:
                                 — user-supplied background images come
                                   through as data: URLs after the upload
                                   validation pipeline; blob: covers the
                                   export download URL.
      * font-src 'self' https://fonts.gstatic.com
                                 — Google Fonts' static asset host.
      * connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com
      * worker-src 'self'        — registers the PWA service worker.
      * manifest-src 'self'      — the PWA web app manifest.
      * object-src 'none'        — no <object>/<embed>.
      * base-uri 'self'          — <base> can't be hijacked.
      * form-action 'self'       — no forms post to third parties.

      Note: `frame-ancestors` is intentionally omitted here — browsers
      ignore it when CSP is delivered via <meta>. GitHub Pages doesn't
      let us send HTTP headers; clickjacking is mitigated at the
      application level (no auth, no sensitive forms) for now.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#2F9F7A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MINT" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <title>MINT — Merge Image 'N Text</title>
    <meta
      name="description"
      content="Make social images in your browser — drop a photo, type a headline, hit Export. No signup, no upload, no watermark. MINT = Merge Image'N Text."
    />

    <!--
      Open Graph + Twitter Card meta. Absolute URLs are mandatory — most
      crawlers ignore relative ones for og:image / og:url. Hardcoded to
      the GitHub Pages host; update both if the project moves.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MINT" />
    <meta property="og:title" content="MINT — Merge Image 'N Text" />
    <meta
      property="og:description"
      content="Make social images in your browser. Drop a photo, type a headline, export PNG / JPEG / WebP. No signup, no upload, no watermark."
    />
    <meta property="og:url" content="https://dimagious.github.io/mint/" />
    <meta
      property="og:image"
      content="https://dimagious.github.io/mint/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="MINT editor showing the Export dialog with a 1080x1080 preview — a coffee photo with the 'Make it MINT' headline, PNG selected, est. 1.1 MB."
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ru_RU" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MINT — Merge Image 'N Text" />
    <meta
      name="twitter:description"
      content="Make social images in your browser. Drop a photo, type a headline, export. No signup, no upload, no watermark."
    />
    <meta
      name="twitter:image"
      content="https://dimagious.github.io/mint/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="MINT editor showing the Export dialog with a 1080x1080 preview of a coffee photo with the 'Make it MINT' headline."
    />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
